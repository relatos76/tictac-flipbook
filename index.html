<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vista previa — El Tic-Tac de la Música</title>

  <style>
    :root {
      --bg: #f7f3eb;
      --panel: #ffffff;
      --ink: #1f1f1f;
      --soft: #6d6258;
      --line: rgba(0, 0, 0, 0.10);
      --shadow: 0 22px 55px rgba(0, 0, 0, 0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 38%),
        linear-gradient(135deg, #f8f3ea, #efe4d5);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .app {
      width: min(100%, 980px);
      text-align: center;
    }

    .intro {
      margin-bottom: 16px;
    }

    .intro h2 {
      margin: 0 0 6px;
      font-size: clamp(1.45rem, 3vw, 2.2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .intro p {
      margin: 0 auto;
      max-width: 680px;
      color: var(--soft);
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      line-height: 1.45;
    }

    .tablet {
      position: relative;
      width: min(100%, 820px);
      margin: 0 auto;
      padding: clamp(12px, 2.5vw, 22px);
      border-radius: var(--radius);
      background: linear-gradient(145deg, #262626, #111111);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .tablet::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: calc(var(--radius) - 7px);
      border: 1px solid rgba(255,255,255,0.09);
      pointer-events: none;
    }

    .screen {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #ebe7df;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .topbar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
      font-size: 0.82rem;
      color: #4a443e;
    }

    .file-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: left;
      font-weight: 650;
    }

    .icons {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-shrink: 0;
    }

    .dot-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      display: inline-block;
    }

    .viewer {
      flex: 1;
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .thumbs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      padding: 4px;
    }

    .thumb {
      height: 66px;
      border-radius: 8px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #776f66;
      opacity: 0.6;
    }

    .thumb.active {
      opacity: 1;
      border: 2px solid rgba(0,0,0,0.45);
      font-weight: 700;
    }

    .page-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1300px;
      min-width: 0;
    }

    .page {
      width: min(100%, 390px);
      height: 520px;
      border-radius: 8px;
      background: #fff;
      box-shadow:
        0 18px 35px rgba(0,0,0,0.18),
        0 1px 0 rgba(255,255,255,0.9) inset;
      overflow: hidden;
      transform-origin: left center;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    .page img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #fff;
    }

    .special-page {
      width: 100%;
      height: 100%;
      padding: 38px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, #fff, #fbfaf6);
      text-align: center;
    }

    .special-page .eyebrow {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6f6255;
      margin-bottom: 20px;
    }

    .special-page h3 {
      margin: 0 0 14px;
      font-size: clamp(1.65rem, 4vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .special-page p {
      margin: 0 auto 18px;
      max-width: 300px;
      color: #5d554d;
      line-height: 1.45;
      font-size: 1rem;
    }

    .bonus-title {
      font-size: clamp(1.45rem, 4vw, 2.15rem);
      font-weight: 900;
      line-height: 1.08;
      margin-top: 6px;
    }

    .price {
      margin-top: 4px;
      font-size: 1.1rem;
      font-weight: 800;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #1f1f1f;
      color: white;
      font-weight: 800;
      padding: 13px 18px;
      border-radius: 999px;
      margin-top: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
    }

    .controls {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 12px 14px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ffffff;
      color: #1f1f1f;
      font-size: 1.35rem;
      font-weight: 800;
      box-shadow: 0 5px 14px rgba(0,0,0,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .counter {
      min-width: 84px;
      height: 38px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 750;
      color: #4a443e;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .hint {
      margin: 12px auto 0;
      color: #756b61;
      font-size: 0.9rem;
    }

    .page.flip-next {
      animation: flipNext 420ms ease both;
    }

    .page.flip-prev {
      animation: flipPrev 420ms ease both;
    }

    @keyframes flipNext {
      0% {
        transform: rotateY(0deg);
        opacity: 1;
      }
      48% {
        transform: rotateY(-55deg) translateX(-12px);
        opacity: 0.35;
      }
      100% {
        transform: rotateY(0deg);
        opacity: 1;
      }
    }

    @keyframes flipPrev {
      0% {
        transform: rotateY(0deg);
        opacity: 1;
      }
      48% {
        transform: rotateY(45deg) translateX(12px);
        opacity: 0.35;
      }
      100% {
        transform: rotateY(0deg);
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .intro {
        margin-bottom: 12px;
      }

      .tablet {
        padding: 10px;
        border-radius: 22px;
      }

      .screen {
        min-height: 560px;
        border-radius: 15px;
      }

      .topbar {
        height: 38px;
        font-size: 0.76rem;
      }

      .viewer {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .thumbs {
        display: none;
      }

      .page {
        width: min(100%, 360px);
        height: 470px;
      }

      .controls {
        height: 54px;
        padding-bottom: 10px;
      }

      .nav-btn {
        width: 42px;
        height: 42px;
      }

      .special-page {
        padding: 28px 22px;
      }

      .hint {
        font-size: 0.82rem;
      }
    }

    @media (max-width: 390px) {
      .page {
        height: 440px;
      }

      .screen {
        min-height: 530px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="intro">
      <h2>Mira por dentro El Tic-Tac de la Música</h2>
      <p>Una pequeña muestra para que veas cómo está organizado el material antes de adquirirlo.</p>
    </section>

    <section class="tablet" aria-label="Vista previa interactiva del material">
      <div class="screen">
        <div class="topbar">
          <div class="file-name">Tic-Tac-de-la-Musica-vista-previa.pdf</div>
          <div class="icons" aria-hidden="true">
            <span class="dot-icon"></span>
            <span class="dot-icon"></span>
            <span class="dot-icon"></span>
          </div>
        </div>

        <div class="viewer">
          <div class="thumbs" id="thumbs"></div>

          <div class="page-stage" id="pageStage">
            <article class="page" id="page"></article>
          </div>
        </div>

        <div class="controls">
          <button class="nav-btn" id="prevBtn" aria-label="Página anterior">‹</button>
          <div class="counter" id="counter">1 / 8</div>
          <button class="nav-btn" id="nextBtn" aria-label="Página siguiente">›</button>
        </div>
      </div>
    </section>

    <p class="hint">Puedes usar las flechas o deslizar en el celular.</p>
  </main>

  <script>
    const gumroadUrl = "basesdelamusica.gumroad.com/l/teoria-musical-practica-pdf";

    const pages = [
      {
        type: "image",
        src: "paginas/tictac-01.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-02.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-03.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-04.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "separator"
      },
      {
        type: "image",
        src: "paginas/bonus-01.png",
        alt: "Página de muestra del bonus Modos griegos"
      },
      {
        type: "image",
        src: "paginas/bonus-02.png",
        alt: "Página de muestra del bonus Modos griegos"
      },
      {
        type: "cta"
      }
    ];

    let current = 0;
    let isAnimating = false;

    const pageEl = document.getElementById("page");
    const counterEl = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const thumbsEl = document.getElementById("thumbs");
    const pageStage = document.getElementById("pageStage");

    function renderThumbs() {
      thumbsEl.innerHTML = "";

      pages.forEach((_, index) => {
        const thumb = document.createElement("div");
        thumb.className = "thumb" + (index === current ? " active" : "");
        thumb.textContent = index + 1;
        thumb.addEventListener("click", () => {
          if (index !== current) {
            goTo(index, index > current ? "next" : "prev");
          }
        });
        thumbsEl.appendChild(thumb);
      });
    }

    function renderPage() {
      const page = pages[current];

      if (page.type === "image") {
        pageEl.innerHTML = `
          <img src="${page.src}" alt="${page.alt}">
        `;
      }

      if (page.type === "separator") {
        pageEl.innerHTML = `
          <div class="special-page">
            <div class="eyebrow">También incluido en el material</div>
            <p>Un vistazo al bonus:</p>
            <div class="bonus-title">Modos griegos<br>Ideas antes de las escalas</div>
          </div>
        `;
      }

      if (page.type === "cta") {
        pageEl.innerHTML = `
          <div class="special-page">
            <h3>¿Quieres estudiar el recorrido completo?</h3>
            <p>
              El Tic-Tac de la Música está pensado para principiantes que necesitan ordenar
              ritmo, pulso, compás, lectura y otras bases musicales con más claridad.
            </p>
            <p>También incluye el bonus <strong>Modos griegos – Ideas antes de las escalas</strong>.</p>
            <div class="price">Precio actual: $7</div>
            <a class="cta-button" href="${gumroadUrl}" target="_blank" rel="noopener">
              Adquirir El Tic-Tac de la Música
            </a>
          </div>
        `;
      }

      counterEl.textContent = `${current + 1} / ${pages.length}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
      renderThumbs();
    }

    function goTo(index, direction) {
      if (isAnimating || index < 0 || index >= pages.length) return;

      isAnimating = true;

      pageEl.classList.remove("flip-next", "flip-prev");
      void pageEl.offsetWidth;
      pageEl.classList.add(direction === "next" ? "flip-next" : "flip-prev");

      setTimeout(() => {
        current = index;
        renderPage();
      }, 180);

      setTimeout(() => {
        pageEl.classList.remove("flip-next", "flip-prev");
        isAnimating = false;
      }, 430);
    }

    prevBtn.addEventListener("click", () => {
      goTo(current - 1, "prev");
    });

    nextBtn.addEventListener("click", () => {
      goTo(current + 1, "next");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") goTo(current - 1, "prev");
      if (event.key === "ArrowRight") goTo(current + 1, "next");
    });

    let touchStartX = 0;
    let touchEndX = 0;

    pageStage.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    pageStage.addEventListener("touchend", (event) => {
      touchEndX = event.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      const distance = touchStartX - touchEndX;

      if (Math.abs(distance) < 45) return;

      if (distance > 0) {
        goTo(current + 1, "next");
      } else {
        goTo(current - 1, "prev");
      }
    }

    pages
      .filter(page => page.type === "image")
      .forEach(page => {
        const img = new Image();
        img.src = page.src;
      });

    renderPage();
  </script>
</body>
</html>
