<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vista previa — El Tic-Tac de la Música</title>

  <style>
    :root {
      --bg: #f6efe4;
      --paper: #ffffff;
      --ink: #1f1f1f;
      --muted: #6d6258;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      --soft-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 40%),
        linear-gradient(135deg, #f8f2e8, #eadcca);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .app {
      width: min(100%, 980px);
      text-align: center;
    }

    .intro {
      margin-bottom: 18px;
    }

    .intro h2 {
      margin: 0 0 7px;
      font-size: clamp(1.45rem, 3vw, 2.15rem);
      line-height: 1.1;
      letter-spacing: -0.035em;
    }

    .intro p {
      margin: 0 auto;
      max-width: 670px;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      line-height: 1.45;
    }

    .tablet {
      position: relative;
      width: min(100%, 850px);
      margin: 0 auto;
      padding: clamp(12px, 2.2vw, 20px);
      border-radius: 30px;
      background: linear-gradient(145deg, #272727, #111);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .screen {
      position: relative;
      min-height: 610px;
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.9), transparent 55%),
        #e9e2d8;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .topbar {
      height: 42px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      color: #4c453e;
      font-size: 0.82rem;
      font-weight: 650;
    }

    .topbar span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-icons {
      display: flex;
      gap: 7px;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .topbar-icons i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      display: block;
    }

    .book-area {
      position: relative;
      min-height: 518px;
      padding: 22px 74px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1600px;
      overflow: hidden;
    }

    .book-shadow {
      position: absolute;
      width: 360px;
      height: 32px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.24), transparent 70%);
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(2px);
      pointer-events: none;
    }

    .page-wrap {
      position: relative;
      width: min(100%, 380px);
      height: 500px;
      transform-style: preserve-3d;
    }

    .page,
    .turning-page {
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: var(--paper);
      overflow: hidden;
      box-shadow: var(--soft-shadow);
      border: 1px solid rgba(0,0,0,0.08);
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .page::after,
    .turning-page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.10), transparent 10%, transparent 88%, rgba(0,0,0,0.05));
      opacity: 0.35;
    }

    .page img,
    .turning-page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
      display: block;
    }

    .page.current {
      z-index: 2;
    }

    .page.next-under {
      z-index: 1;
      transform: translateX(8px) scale(0.992);
      opacity: 0.98;
    }

    .turning-page {
      z-index: 5;
      transform-origin: left center;
      animation: turnNext 760ms cubic-bezier(.22,.7,.18,1) forwards;
    }

    .turning-page.prev {
      transform-origin: right center;
      animation: turnPrev 760ms cubic-bezier(.22,.7,.18,1) forwards;
    }

    @keyframes turnNext {
      0% {
        transform: rotateY(0deg) translateX(0);
        opacity: 1;
        box-shadow: 0 16px 30px rgba(0,0,0,0.18);
      }
      45% {
        opacity: 0.92;
      }
      100% {
        transform: rotateY(-105deg) translateX(-20px);
        opacity: 0;
        box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      }
    }

    @keyframes turnPrev {
      0% {
        transform: rotateY(0deg) translateX(0);
        opacity: 1;
        box-shadow: 0 16px 30px rgba(0,0,0,0.18);
      }
      45% {
        opacity: 0.92;
      }
      100% {
        transform: rotateY(105deg) translateX(20px);
        opacity: 0;
        box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      }
    }

    .side-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 0;
      background: rgba(255,255,255,0.94);
      color: #1f1f1f;
      font-size: 2rem;
      line-height: 1;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .side-arrow:hover {
      transform: translateY(-50%) scale(1.05);
    }

    .side-arrow:disabled {
      opacity: 0.28;
      cursor: not-allowed;
      transform: translateY(-50%) scale(1);
    }

    .side-arrow.left {
      left: 16px;
    }

    .side-arrow.right {
      right: 16px;
    }

    .bottom-info {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 10px;
    }

    .counter {
      font-size: 0.86rem;
      font-weight: 750;
      color: #5f564d;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 8px 14px;
    }

    .special-page {
      width: 100%;
      height: 100%;
      padding: 36px 28px;
      background:
        linear-gradient(180deg, #fff, #fbfaf6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .special-page .eyebrow {
      font-size: 0.95rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #74675a;
      margin-bottom: 18px;
    }

    .special-page h3 {
      margin: 0 0 15px;
      font-size: clamp(1.65rem, 4vw, 2.28rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .special-page p {
      margin: 0 auto 16px;
      max-width: 305px;
      color: #5d554d;
      line-height: 1.45;
      font-size: 1rem;
    }

    .bonus-title {
      font-size: clamp(1.45rem, 4vw, 2.12rem);
      font-weight: 900;
      line-height: 1.08;
      margin-top: 6px;
    }

    .price {
      margin-top: 2px;
      font-size: 1.1rem;
      font-weight: 850;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #1f1f1f;
      color: #fff;
      font-weight: 850;
      padding: 13px 18px;
      border-radius: 999px;
      margin-top: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
      transition: transform 0.18s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
    }

    .hint {
      margin: 12px auto 0;
      color: #756b61;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .tablet {
        padding: 10px;
        border-radius: 22px;
      }

      .screen {
        min-height: 570px;
        border-radius: 16px;
      }

      .book-area {
        min-height: 480px;
        padding: 16px 44px 10px;
      }

      .page-wrap {
        width: min(100%, 335px);
        height: 450px;
      }

      .side-arrow {
        width: 42px;
        height: 42px;
        font-size: 1.6rem;
      }

      .side-arrow.left {
        left: 8px;
      }

      .side-arrow.right {
        right: 8px;
      }

      .topbar {
        height: 38px;
        font-size: 0.75rem;
      }

      .special-page {
        padding: 26px 20px;
      }

      .hint {
        font-size: 0.82rem;
      }
    }

    @media (max-width: 390px) {
      .page-wrap {
        height: 420px;
      }

      .book-area {
        min-height: 450px;
      }

      .screen {
        min-height: 540px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="intro">
      <h2>Mira por dentro El Tic-Tac de la Música</h2>
      <p>Una pequeña muestra para que veas cómo está organizado el material antes de adquirirlo.</p>
    </section>

    <section class="tablet" aria-label="Vista previa interactiva de El Tic-Tac de la Música">
      <div class="screen">
        <div class="topbar">
          <span>Tic-Tac-de-la-Musica-vista-previa.pdf</span>
          <div class="topbar-icons" aria-hidden="true">
            <i></i><i></i><i></i>
          </div>
        </div>

        <button class="side-arrow left" id="prevBtn" aria-label="Página anterior">‹</button>
        <button class="side-arrow right" id="nextBtn" aria-label="Página siguiente">›</button>

        <div class="book-area" id="bookArea">
          <div class="book-shadow"></div>
          <div class="page-wrap" id="pageWrap">
            <article class="page next-under" id="underPage"></article>
            <article class="page current" id="currentPage"></article>
          </div>
        </div>

        <div class="bottom-info">
          <div class="counter" id="counter">Página 1 de 8</div>
        </div>
      </div>
    </section>

    <p class="hint">Usa las flechas o desliza en el celular.</p>
  </main>

  <script>
    const gumroadUrl = "basesdelamusica.gumroad.com/l/teoria-musical-practica-pdf";

    const pages = [
      {
        type: "image",
        src: "paginas/tictac-01.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-02.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-03.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "image",
        src: "paginas/tictac-04.png",
        alt: "Página de muestra de El Tic-Tac de la Música"
      },
      {
        type: "separator"
      },
      {
        type: "image",
        src: "paginas/bonus-01.png",
        alt: "Página de muestra del bonus Modos griegos"
      },
      {
        type: "image",
        src: "paginas/bonus-02.png",
        alt: "Página de muestra del bonus Modos griegos"
      },
      {
        type: "cta"
      }
    ];

    let current = 0;
    let animating = false;

    const currentPage = document.getElementById("currentPage");
    const underPage = document.getElementById("underPage");
    const pageWrap = document.getElementById("pageWrap");
    const bookArea = document.getElementById("bookArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const counter = document.getElementById("counter");

    function pageHTML(page) {
      if (page.type === "image") {
        return `<img src="${page.src}" alt="${page.alt}">`;
      }

      if (page.type === "separator") {
        return `
          <div class="special-page">
            <div class="eyebrow">También incluido en el material</div>
            <p>Un vistazo al bonus:</p>
            <div class="bonus-title">Modos griegos<br>Ideas antes de las escalas</div>
          </div>
        `;
      }

      if (page.type === "cta") {
        return `
          <div class="special-page">
            <h3>¿Quieres estudiar el recorrido completo?</h3>
            <p>
              El Tic-Tac de la Música está pensado para principiantes que necesitan ordenar
              ritmo, pulso, compás, lectura y otras bases musicales con más claridad.
            </p>
            <p>También incluye el bonus <strong>Modos griegos – Ideas antes de las escalas</strong>.</p>
            <div class="price">Precio actual: $7</div>
            <a class="cta-button" href="${gumroadUrl}" target="_blank" rel="noopener">
              Adquirir El Tic-Tac de la Música
            </a>
          </div>
        `;
      }
    }

    function renderStatic() {
      currentPage.innerHTML = pageHTML(pages[current]);

      const nextIndex = Math.min(current + 1, pages.length - 1);
      underPage.innerHTML = pageHTML(pages[nextIndex]);

      counter.textContent = `Página ${current + 1} de ${pages.length}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
    }

    function goNext() {
      if (animating || current >= pages.length - 1) return;

      animating = true;

      const oldHTML = pageHTML(pages[current]);
      const nextHTML = pageHTML(pages[current + 1]);

      underPage.innerHTML = nextHTML;

      const turning = document.createElement("article");
      turning.className = "turning-page";
      turning.innerHTML = oldHTML;
      pageWrap.appendChild(turning);

      currentPage.style.opacity = "0";

      setTimeout(() => {
        current++;
        currentPage.style.opacity = "1";
        renderStatic();
        turning.remove();
        animating = false;
      }, 760);
    }

    function goPrev() {
      if (animating || current <= 0) return;

      animating = true;

      const oldHTML = pageHTML(pages[current]);
      const prevHTML = pageHTML(pages[current - 1]);

      underPage.innerHTML = prevHTML;

      const turning = document.createElement("article");
      turning.className = "turning-page prev";
      turning.innerHTML = oldHTML;
      pageWrap.appendChild(turning);

      currentPage.style.opacity = "0";

      setTimeout(() => {
        current--;
        currentPage.style.opacity = "1";
        renderStatic();
        turning.remove();
        animating = false;
      }, 760);
    }

    nextBtn.addEventListener("click", goNext);
    prevBtn.addEventListener("click", goPrev);

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") goNext();
      if (e.key === "ArrowLeft") goPrev();
    });

    let touchStartX = 0;
    let touchEndX = 0;

    bookArea.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    bookArea.addEventListener("touchend", (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const distance = touchStartX - touchEndX;

      if (Math.abs(distance) < 45) return;

      if (distance > 0) {
        goNext();
      } else {
        goPrev();
      }
    }, { passive: true });

    pages
      .filter(page => page.type === "image")
      .forEach(page => {
        const img = new Image();
        img.src = page.src;
      });

    renderStatic();
  </script>
</body>
</html>
